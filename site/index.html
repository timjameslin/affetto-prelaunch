<style>
  /* ───────────────────────────────────────────────────────────────────
     Affetto pre-launch — v0.8.0
     Foundation: Geist type system, 1.25 modular scale, 16px body floor,
     8px baseline, 12/8/4 column grid, single accent, WCAG AA contrast.
     ─────────────────────────────────────────────────────────────────── */

  :root {
    /* Color — restrained. Single accent. Contrast-checked. */
    --paper:        #FAFAF8;
    --paper-2:      #F1F1ED;
    --ink:          #0B0B09;
    --ink-2:        #2B2B26;
    --ink-3:        #5A5A52;
    --ink-4:        #8A8A82;
    --rule:         #0B0B09;
    --rule-soft:    rgba(11, 11, 9, 0.12);
    --rule-softer:  rgba(11, 11, 9, 0.06);
    --accent:       #C2331A;

    /* Type — Geist (with system fallbacks). */
    --sans:    "Geist", "Helvetica Neue", "Arial", -apple-system, BlinkMacSystemFont, sans-serif;
    --display: "Geist", "Helvetica Neue", "Arial", -apple-system, BlinkMacSystemFont, sans-serif;
    --mono:    "Geist Mono", ui-monospace, "SF Mono", Menlo, monospace;

    /* Modular scale — 1.25 ratio, Geist-tuned (slightly tighter than older sans). */
    --t-display:  68px;
    --t-h1:       52px;
    --t-h2:       34px;
    --t-h3:       26px;
    --t-body-lg:  21px;
    --t-body:     16px;
    --t-caption:  14px;
    --t-micro:    12px;

    /* 8px baseline tokens. */
    --s-1: 8px;  --s-2: 16px; --s-3: 24px;
    --s-4: 32px; --s-6: 48px; --s-8: 64px;
    --s-12: 96px; --s-16: 128px;

    /* Grid */
    --gutter:  24px;
    --margin:  64px;
    --max:     1280px;
  }

  /* Mobile-down scale */
  @media (max-width: 767px) {
    :root {
      --t-display:  44px;
      --t-h1:       36px;
      --t-h2:       26px;
      --t-h3:       20px;
      --t-body-lg:  18px;
      --gutter:     16px;
      --margin:     24px;
    }
  }
  /* Tablet */
  @media (min-width: 768px) and (max-width: 1099px) {
    :root {
      --t-display:  56px;
      --t-h1:       42px;
      --gutter:     20px;
      --margin:     40px;
    }
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    background: var(--paper);
    color: var(--ink);
    font-family: var(--sans);
    font-size: var(--t-body);
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    font-feature-settings: "ss01" on, "ss03" on;
  }
  ::selection { background: var(--accent); color: var(--paper); }
  a {
    color: inherit;
    text-decoration: none;
    -webkit-tap-highlight-color: transparent;
  }
  :focus-visible {
    outline: 2px solid var(--accent);
    outline-offset: 2px;
  }
  button, input, select, textarea { font-family: inherit; font-size: inherit; }
  button { cursor: pointer; }

  /* Type tokens */
  .t-display { font-family: var(--display); font-size: var(--t-display); line-height: 1.0;  letter-spacing: -0.04em;  font-weight: 500; }
  .t-h1      { font-family: var(--display); font-size: var(--t-h1);      line-height: 1.05; letter-spacing: -0.035em; font-weight: 500; }
  .t-h2      { font-family: var(--display); font-size: var(--t-h2);      line-height: 1.15; letter-spacing: -0.028em; font-weight: 500; }
  .t-h3      { font-family: var(--sans);    font-size: var(--t-h3);      line-height: 1.25; letter-spacing: -0.015em; font-weight: 500; }
  .t-bodylg  { font-family: var(--sans);    font-size: var(--t-body-lg); line-height: 1.55; letter-spacing: -0.005em; font-weight: 400; }
  .t-body    { font-family: var(--sans);    font-size: var(--t-body);    line-height: 1.55; }
  .t-caption { font-family: var(--sans);    font-size: var(--t-caption); line-height: 1.5;  letter-spacing: 0.01em; }
  .t-micro   {
    font-family: var(--sans); font-size: var(--t-micro); line-height: 1.5;
    letter-spacing: 0.08em; text-transform: uppercase; font-weight: 500;
    font-feature-settings: "tnum" on;
  }

  /* Layout primitives */
  .container {
    max-width: var(--max);
    margin: 0 auto;
    padding-left: var(--margin);
    padding-right: var(--margin);
  }
  .prose { max-width: 75ch; }

  /* Tap targets */
  .tap { min-height: 44px; min-width: 44px; }

  /* Topbar */
  .topbar {
    display: flex; align-items: center; gap: 24px;
    height: 36px;
    padding: 0 var(--margin);
    border-bottom: 1px solid var(--ink);
  }

  /* Hero container */
  .hero-container { width: 100%; }

  /* Hero preview frame (Stage 2 of hero) */
  .hero-preview-frame {
    /* Layout supplied inline by component; this rule reserved for printing. */
  }

  /* CTA primary — the Hero CTA and form submit share this. */
  .cta-primary {
    display: inline-flex;
    align-items: center;
    gap: 12px;
    padding: 18px 28px;
    background: var(--ink);
    color: var(--paper);
    font-family: var(--sans);
    font-size: 17px;
    font-weight: 500;
    letter-spacing: -0.005em;
    border: 1px solid var(--ink);
    transition: background 200ms ease, color 200ms ease;
    text-decoration: none;
    cursor: pointer;
  }
  .cta-primary:hover {
    background: var(--paper);
    color: var(--ink);
  }
  .cta-primary .arrow {
    font-weight: 400;
    transition: transform 200ms ease;
    display: inline-block;
  }
  .cta-primary:hover .arrow {
    transform: translateX(3px);
  }
  .cta-primary:focus-visible {
    outline: 2px solid var(--accent);
    outline-offset: 4px;
  }

  /* Inline mid-page CTA — subtle typographic affordance after Outcomes */
  .inline-cta {
    border-bottom-color: var(--rule-soft);
    transition: border-bottom-color 200ms ease;
  }
  .inline-cta:hover {
    border-bottom-color: var(--ink);
  }
  .inline-cta:hover .inline-cta-arrow {
    transform: translateX(4px);
  }

  /* "What this means" beat — quoted block in System section */
  .what-this-means {
    /* Layout supplied inline; print rule preserved below. */
  }

  /* Force card — anatomy supplied inline by ForceCard component;
     this rule reserved for hover/print states. */
  .force-card {
    transition: border-color 180ms ease;
  }

  /* Agent card — interactive (button), opens modal on click.
     Hover state (Option 1):  paper-2 background tint, accent border.
     Click-ack (Option 3):    150ms ink-fill flash with internal CSS variable
                              overrides flipping every child's color. After
                              the flash, the modal opens. */
  .agent-card {
    background: var(--paper);
    border: 1px solid var(--ink);
    color: var(--ink);
    text-align: left;
    padding: 24px 20px;
    cursor: pointer;
    transition:
      background-color 180ms ease,
      border-color 180ms ease,
      transform 200ms ease;
    font-family: inherit;
    width: 100%;
    display: flex;
    flex-direction: column;
  }
  .agent-card:hover {
    background: var(--paper-2);
    border-color: var(--accent);
  }
  .agent-card:focus-visible {
    outline: 2px solid var(--accent);
    outline-offset: 2px;
  }

  /* Click-ack inversion. Locally redefines the ink-family variables and
     paper variable so every descendant that uses them flips correctly.
     Lasts 150ms, then the modal opens. */
  .agent-card.is-acking {
    --paper:        #0B0B09;
    --paper-2:      #1B1B17;
    --ink:          #FAFAF8;
    --ink-2:        #DADAD2;
    --ink-3:        #9A9A92;
    --ink-4:        #6A6A62;
    --rule-soft:    rgba(250, 250, 248, 0.18);
    --accent:       #E85A40; /* lifted accent for visibility on dark fill */
    background: #0B0B09;
    border-color: #0B0B09;
    color: #FAFAF8;
    transition:
      background-color 100ms ease,
      border-color 100ms ease,
      color 100ms ease;
  }

  /* Modal overlay (agent detail panel) */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(11, 11, 9, 0.6);
    display: grid;
    place-items: center;
    z-index: 50;
    padding: 24px;
    animation: modal-fade 160ms ease-out;
  }
  .modal-panel {
    background: var(--paper);
    border: 1px solid var(--ink);
    max-width: 720px;
    width: 100%;
    max-height: calc(100vh - 48px);
    overflow-y: auto;
    padding: 48px;
    animation: modal-rise 200ms ease-out;
  }
  @keyframes modal-fade {
    from { opacity: 0; }
    to   { opacity: 1; }
  }
  @keyframes modal-rise {
    from { transform: translateY(8px); opacity: 0; }
    to   { transform: translateY(0);   opacity: 1; }
  }
  @media (max-width: 767px) {
    .modal-panel { padding: 32px 24px; }
  }

  /* Form fields */
  .form-input,
  .form-select {
    display: block;
    width: 100%;
    max-width: 480px;
    height: 56px;
    padding: 0 16px;
    background: var(--paper);
    color: var(--ink);
    border: 1px solid var(--ink);
    border-radius: 0;
    font-family: var(--sans);
    font-size: 17px;
    line-height: 1.4;
    transition: border-color 160ms ease;
  }
  .form-input::placeholder { color: var(--ink-3); }
  .form-input:focus,
  .form-select:focus {
    outline: none;
    border-color: var(--accent);
    border-width: 2px;
    padding: 0 15px; /* compensate so width doesn't shift */
  }
  .form-select {
    appearance: none;
    background-image: linear-gradient(45deg, transparent 50%, var(--ink-3) 50%),
                      linear-gradient(135deg, var(--ink-3) 50%, transparent 50%);
    background-position: calc(100% - 18px) 50%, calc(100% - 12px) 50%;
    background-size: 6px 6px, 6px 6px;
    background-repeat: no-repeat;
    padding-right: 36px;
  }
  .form-submit {
    /* Inherits cta-primary visual style if class is combined; otherwise: */
    border: 1px solid var(--ink);
    background: var(--ink);
    color: var(--paper);
    padding: 18px 28px;
    font-family: var(--sans);
    font-size: 17px;
    font-weight: 500;
    cursor: pointer;
    transition: background 200ms ease, color 200ms ease;
  }
  .form-submit:hover { background: var(--paper); color: var(--ink); }

  /* Living topology animations */
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50%      { opacity: 0.4; }
  }
  @keyframes fadeInDown {
    0%   { opacity: 0; transform: translateY(-6px); }
    100% { opacity: 1; transform: translateY(0); }
  }
  @keyframes telemetryFade {
    0%   { opacity: 0; transform: translateY(2px); }
    15%  { opacity: 1; transform: translateY(0); }
    85%  { opacity: 1; }
    100% { opacity: 0.85; }
  }
  @keyframes scan-line {
    0%   { transform: translateX(-100%); opacity: 0; }
    10%  { opacity: 1; }
    90%  { opacity: 1; }
    100% { transform: translateX(100%); opacity: 0; }
  }
  @keyframes agent-glow {
    0%   { background: transparent; }
    20%  { background: rgba(11, 11, 9, 0.06); }
    100% { background: transparent; }
  }
  @keyframes source-ack {
    0%   { transform: scaleX(0); opacity: 1; }
    40%  { transform: scaleX(1); opacity: 1; }
    100% { transform: scaleX(1); opacity: 0; }
  }
  @keyframes dash-travel {
    to { stroke-dashoffset: -16; }
  }
  .living-scan-line {
    animation: scan-line 4s linear infinite;
    will-change: transform;
  }
  .living-validated-route {
    stroke-dasharray: 4 4;
    animation: dash-travel 8s linear infinite;
  }

  /* Reduced motion — kill all animation, keep functionality */
  @media (prefers-reduced-motion: reduce) {
    *,
    *::before,
    *::after {
      animation-duration: 0.001ms !important;
      animation-iteration-count: 1 !important;
      transition-duration: 0.001ms !important;
    }
    .living-scan-line,
    .living-validated-route { animation: none !important; }
  }

  /* Print stylesheet */
  @page { size: A4 portrait; margin: 18mm; }
  @media print {
    html, body {
      background: #fff !important;
      color: #000 !important;
      -webkit-print-color-adjust: exact;
      print-color-adjust: exact;
    }
    * { animation: none !important; transition: none !important; }
    [data-print-hide] { display: none !important; }
    [data-print-static] { position: static !important; }
    section, [data-keep-together] {
      break-inside: avoid;
      page-break-inside: avoid;
    }
    .topbar { border-bottom: 1px solid #000; }
    .container { padding-left: 0; padding-right: 0; max-width: 100%; }
    a { color: inherit; text-decoration: none; }
    [data-reveal] { opacity: 1 !important; transform: none !important; }
    .modal-overlay { display: none !important; }
  }
</style>
</head>
